<div class="p-4">
  <div class="container">
    <h1>Hi {{ authUser?.username || authUser?.name }}!</h1>
    <hr />
    <h4 class="alert-heading">Angular Versions ::</h4>
    <pre>Angular Core {{ angularVersion }}</pre>
    <pre>Angular CLI 20.3.15</pre>
    <hr />
    <h4 class="alert-heading">User JSON ::</h4>
    <pre>{{ authUser | json }}</pre>
    <button type="button" class="btn btn-primary" (click)="manageUsers()">Manage Users</button>
    <button type="button" class="btn btn-primary m-1" (click)="getUserDetails()">
      Refresh User Details
    </button>
    <button type="button" class="btn btn-primary m-1" (click)="performPostRequest()">
      Perform Post Request
    </button>
    @if (postResponse) {
      <hr />
      <h4 class="alert-heading">POST Response ::</h4>
      <pre>{{ postResponse | json }}</pre>
    }
  </div>
</div>
